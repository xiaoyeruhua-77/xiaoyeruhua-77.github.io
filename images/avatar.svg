<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" role="img" aria-label="Avatar Placeholder">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a8cff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#2e5bff" stop-opacity="0.7"/>
    </linearGradient>
    <radialGradient id="g2" cx="30%" cy="20%" r="80%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="600" height="600" rx="46" fill="rgba(255,255,255,0.04)"/>
  <rect x="26" y="26" width="548" height="548" rx="38" fill="url(#g1)" filter="url(#shadow)"/>
  <rect x="26" y="26" width="548" height="548" rx="38" fill="url(#g2)"/>

  <circle cx="300" cy="250" r="92" fill="rgba(255,255,255,0.92)"/>
  <path d="M150 500c24-96 110-146 150-146s126 50 150 146" fill="rgba(255,255,255,0.92)"/>

  <g opacity="0.85">
    <circle cx="120" cy="120" r="6" fill="#ffffff"/>
    <circle cx="480" cy="140" r="4" fill="#ffffff"/>
    <circle cx="520" cy="420" r="5" fill="#ffffff"/>
    <circle cx="110" cy="420" r="4" fill="#ffffff"/>
  </g>

  <text x="300" y="90" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="rgba(255,255,255,0.92)">
    头像占位图（替换 images/avatar.svg 即可）
  </text>
</svg>
