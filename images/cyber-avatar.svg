<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c4a0"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#ff00ff"/>
    </linearGradient>
    <linearGradient id="jacket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="neonCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#00a0ff"/>
    </linearGradient>
    <linearGradient id="neonPink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff00ff"/>
      <stop offset="100%" stop-color="#ff0080"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frame">
      <rect x="40" y="40" width="320" height="320" rx="20"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>

  <!-- 网格线 -->
  <g opacity="0.08" stroke="#00f0ff" stroke-width="0.5">
    <line x1="40" y1="100" x2="360" y2="100"/>
    <line x1="40" y1="160" x2="360" y2="160"/>
    <line x1="40" y1="220" x2="360" y2="220"/>
    <line x1="40" y1="280" x2="360" y2="280"/>
    <line x1="100" y1="40" x2="100" y2="360"/>
    <line x1="160" y1="40" x2="160" y2="360"/>
    <line x1="220" y1="40" x2="220" y2="360"/>
    <line x1="280" y1="40" x2="280" y2="360"/>
  </g>

  <!-- 霓虹边框 -->
  <rect x="40" y="40" width="320" height="320" rx="20" fill="none" stroke="url(#neonCyan)" stroke-width="2" filter="url(#glow)" opacity="0.6"/>
  <rect x="44" y="44" width="312" height="312" rx="18" fill="none" stroke="url(#neonPink)" stroke-width="1" filter="url(#glow)" opacity="0.3"/>

  <g clip-path="url(#frame)">
    <!-- 身体/夹克 -->
    <path d="M80 400 L80 300 Q80 260 120 250 L140 245 Q170 235 200 235 Q230 235 260 245 L280 250 Q320 260 320 300 L320 400 Z" fill="url(#jacket)"/>

    <!-- 夹克上的霓虹线条 -->
    <path d="M140 260 L140 400" stroke="url(#neonCyan)" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
    <path d="M260 260 L260 400" stroke="url(#neonPink)" stroke-width="1.5" opacity="0.7" filter="url(#glow)"/>
    <path d="M140 280 L260 280" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <path d="M130 310 L270 310" stroke="#ff00ff" stroke-width="1" opacity="0.3"/>

    <!-- 领口 -->
    <path d="M160 245 L200 270 L240 245" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow)" opacity="0.8"/>

    <!-- 脖子 -->
    <rect x="170" y="210" width="60" height="40" rx="5" fill="url(#skin)"/>

    <!-- 脸 -->
    <ellipse cx="200" cy="160" rx="65" ry="75" fill="url(#skin)"/>

    <!-- 头发 - 赛博朋克风格短发 -->
    <path d="M135 155 Q135 80 200 75 Q265 80 265 155 L260 130 Q250 95 200 90 Q150 95 140 130 Z" fill="url(#hair)"/>
    <!-- 头发高光 -->
    <path d="M150 120 Q160 100 180 95" stroke="#00f0ff" stroke-width="2" fill="none" opacity="0.6" filter="url(#glow)"/>
    <path d="M250 120 Q240 100 220 95" stroke="#ff00ff" stroke-width="2" fill="none" opacity="0.6" filter="url(#glow)"/>

    <!-- 耳机/增强设备 - 左 -->
    <rect x="122" y="140" width="18" height="35" rx="6" fill="#1a1a2e" stroke="#00f0ff" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="131" cy="152" r="4" fill="#00f0ff" opacity="0.9" filter="url(#glowStrong)"/>
    <line x1="122" y1="165" x2="115" y2="180" stroke="#00f0ff" stroke-width="1.5" opacity="0.7"/>

    <!-- 耳机/增强设备 - 右 -->
    <rect x="260" y="140" width="18" height="35" rx="6" fill="#1a1a2e" stroke="#ff00ff" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="269" cy="152" r="4" fill="#ff00ff" opacity="0.9" filter="url(#glowStrong)"/>
    <line x1="278" y1="165" x2="285" y2="180" stroke="#ff00ff" stroke-width="1.5" opacity="0.7"/>

    <!-- 眉毛 -->
    <path d="M165 138 Q180 132 195 136" stroke="#2a1a3e" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M205 136 Q220 132 235 138" stroke="#2a1a3e" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- 眼睛 - 赛博朋克风格 -->
    <!-- 左眼 -->
    <ellipse cx="178" cy="155" rx="16" ry="12" fill="#fff"/>
    <ellipse cx="180" cy="155" rx="8" ry="9" fill="#1a1a2e"/>
    <ellipse cx="180" cy="155" rx="5" ry="6" fill="#00f0ff" filter="url(#glowStrong)"/>
    <ellipse cx="181" cy="153" rx="2" ry="2" fill="#fff"/>
    <!-- 左眼赛博扫描线 -->
    <line x1="162" y1="155" x2="194" y2="155" stroke="#00f0ff" stroke-width="0.5" opacity="0.5"/>

    <!-- 右眼 -->
    <ellipse cx="222" cy="155" rx="16" ry="12" fill="#fff"/>
    <ellipse cx="220" cy="155" rx="8" ry="9" fill="#1a1a2e"/>
    <ellipse cx="220" cy="155" rx="5" ry="6" fill="#ff00ff" filter="url(#glowStrong)"/>
    <ellipse cx="219" cy="153" rx="2" ry="2" fill="#fff"/>
    <!-- 右眼赛博扫描线 -->
    <line x1="206" y1="155" x2="238" y2="155" stroke="#ff00ff" stroke-width="0.5" opacity="0.5"/>

    <!-- 鼻子 -->
    <path d="M197 168 L200 178 L203 168" stroke="#c49a6c" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- 嘴巴 -->
    <path d="M185 192 Q200 200 215 192" stroke="#c49a6c" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- 脸部赛博植入物 - 左脸颊 -->
    <rect x="148" y="170" width="12" height="6" rx="2" fill="#1a1a2e" stroke="#00f0ff" stroke-width="1" opacity="0.8"/>
    <circle cx="151" cy="173" r="1.5" fill="#00f0ff" filter="url(#glow)"/>
    <circle cx="157" cy="173" r="1.5" fill="#00f0ff" filter="url(#glow)"/>

    <!-- 脸部赛博植入物 - 右脸颊 -->
    <rect x="240" y="170" width="12" height="6" rx="2" fill="#1a1a2e" stroke="#ff00ff" stroke-width="1" opacity="0.8"/>
    <circle cx="243" cy="173" r="1.5" fill="#ff00ff" filter="url(#glow)"/>
    <circle cx="249" cy="173" r="1.5" fill="#ff00ff" filter="url(#glow)"/>

    <!-- 额头数据线 -->
    <path d="M170 115 L175 120 L185 118 L190 122" stroke="#00f0ff" stroke-width="1" fill="none" opacity="0.5" filter="url(#glow)"/>
    <path d="M230 115 L225 120 L215 118 L210 122" stroke="#ff00ff" stroke-width="1" fill="none" opacity="0.5" filter="url(#glow)"/>
  </g>

  <!-- 角落装饰 -->
  <g filter="url(#glow)" opacity="0.7">
    <path d="M45 60 L45 45 L60 45" stroke="#00f0ff" stroke-width="2" fill="none"/>
    <path d="M355 60 L355 45 L340 45" stroke="#ff00ff" stroke-width="2" fill="none"/>
    <path d="M45 340 L45 355 L60 355" stroke="#ff00ff" stroke-width="2" fill="none"/>
    <path d="M355 340 L355 355 L340 355" stroke="#00f0ff" stroke-width="2" fill="none"/>
  </g>

  <!-- 底部文字 -->
  <text x="200" y="385" text-anchor="middle" fill="#00f0ff" font-family="monospace" font-size="10" opacity="0.6" filter="url(#glow)">ID:HSQ_2026 // NEURAL_LINK_ACTIVE</text>
</svg>